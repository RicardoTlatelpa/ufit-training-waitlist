[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Turnstile site keys are public by design (embedded in the widget). Omit from secrets scan.
  SECRETS_SCAN_OMIT_KEYS = "TURNSTILE_SITE_KEY,NEXT_PUBLIC_TURNSTILE_SITE_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
